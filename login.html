<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group AR System - Login Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: auto; 
            position: relative; 
        }
        
        
        .floating-emojis { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: -1; 
        }
        .emoji-item { 
            position: absolute; opacity: 0.15; animation: float 6s infinite ease-in-out; 
        }
        @keyframes float { 
            0%, 100% { transform: translateY(0) rotate(0deg); } 
            50% { transform: translateY(-20px) rotate(15deg); } 
        }
        
        .card { 
            border: none; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); 
        }
        .nav-pills .nav-link { border-radius: 12px; font-weight: 600; color: #6c757d; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: white; }
        
        
        .form-control:focus, .btn:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.25);
            outline: none;
        }

        .d-none { display: none !important; }

        
        @media (max-width: 576px) {
    
            .container, .card { 
                width: 95% !important; 
                margin: 20px auto !important; 
                padding: 1.5rem !important;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            }

    
            h2, h5 { text-align: center; }
            ul { 
                display: flex; 
                justify-content: center; 
                padding: 0; 
                list-style: none; 
                gap: 15px; 
            }

            input, select, .btn {
                width: 100% !important; 
                height: 45px;
                margin-bottom: 15px !important;
            }

            label {
                font-weight: bold;
                margin-bottom: 5px;
                display: block;
            }

            .floating-emojis {
                opacity: 0.3; 
            }
        }

    </style>
</head>
<body>

    <div class="floating-emojis" aria-hidden="true">
        <div class="emoji-item" style="top:5%; left:5%; font-size:3rem;">🔧</div>
        <div class="emoji-item" style="top:12%; left:30%; font-size:2rem; opacity:0.1;">🛠️</div>
        <div class="emoji-item" style="top:8%; left:65%; font-size:2.5rem; opacity:0.08;">💧</div>
        <div class="emoji-item" style="top:20%; left:85%; font-size:2.5rem;">🔨</div>
        <div class="emoji-item" style="top:35%; left:10%; font-size:3.5rem; opacity:0.1;">🏗️</div>
        <div class="emoji-item" style="top:30%; left:50%; font-size:2rem; opacity:0.12;">🚪</div>
        <div class="emoji-item" style="top:55%; left:5%; font-size:2.2rem; opacity:0.09;">🔩</div>
        <div class="emoji-item" style="top:50%; left:80%; font-size:3rem; opacity:0.11;">⚡</div>
        <div class="emoji-item" style="top:65%; left:65%; font-size:3rem;">🧰</div>
        <div class="emoji-item" style="top:75%; left:20%; font-size:4rem;">⚙️</div>
        <div class="emoji-item" style="top:85%; left:45%; font-size:2.5rem; opacity:0.1;">🔩</div>
        <div class="emoji-item" style="top:92%; left:10%; font-size:2.8rem; opacity:0.13;">🏠</div>
        <div class="emoji-item" style="top:15%; left:75%; font-size:2.2rem;">🔨</div>
        <div class="emoji-item" style="top:45%; left:25%; font-size:2.6rem;">🔧</div>
        <div class="emoji-item" style="top:60%; left:40%; font-size:2.5rem; opacity:0.1;">🔌</div>
        <div class="emoji-item" style="top:40%; left:90%; font-size:3rem; opacity:0.1;">⚡</div>
        <div class="emoji-item" style="top:78%; left:55%; font-size:2rem; opacity:0.09;">🧰</div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width:70px; height:70px;">
                            <i class="bi bi-tools fs-1"></i>
                        </div>
                        <h2 class="fw-bold">Group AR System</h2>
                        <p class="text-muted">Maintenance Request Management System</p>
                    </div>
                    
                    
                    <div id="authTabs">
                        <ul class="nav nav-pills nav-justified mb-4">
                            <li class="nav-item"><a class="nav-link active fw-bold" id="login-tab" data-bs-toggle="pill" href="#login-pane">Login</a></li>
                            <li class="nav-item"><a class="nav-link fw-bold" id="reg-tab" data-bs-toggle="pill" href="#reg-pane">Register</a></li>
                        </ul>

                        <div class="tab-content">
                            
                            <div class="tab-pane fade show active" id="login-pane">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label for="lEmail" class="form-label fw-bold small">EMAIL</label>
                                        <input type="email" id="lEmail" class="form-control" placeholder="Enter the email" required aria-required="true">
                                    </div>
                                    <div class="mb-2">
                                        <label for="lPass" class="form-label fw-bold small">PASSWORD</label>
                                        <input type="password" id="lPass" class="form-control" placeholder="Enter the password" required aria-required="true">
                                    </div>
                                    <div class="text-end mb-4">
                                        <a href="#" id="toForgotBtn" class="small text-decoration-none">Forgot Password?</a>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 btn-lg shadow fw-bold">Sign In</button>
                                    <div id="loginError" class="text-danger small mt-2" aria-live="assertive"></div>
                                </form>
                            </div>

                            
                            <div class="tab-pane fade" id="reg-pane">
                                <form id="regForm">
                                    <div class="mb-3">
                                        <label for="rName" class="form-label fw-bold small">NAME</label>
                                        <input type="text" id="rName" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="rEmail" class="form-label fw-bold small">EMAIL</label>
                                        <input type="email" id="rEmail" class="form-control" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="rPass" class="form-label fw-bold small">PASSWORD</label>
                                        <input type="password" id="rPass" class="form-control" required>
                                    </div>
                                    <div class="mb-4">
                                        <label for="rRole" class="form-label fw-bold small">IDENTITY</label>
                                        <select id="rRole" class="form-select">
                                            <option value="tenant">Tenant</option>
                                            <option value="worker">Staff</option>
                                            <option value="admin">Administrator</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-success w-100 btn-lg shadow fw-bold">Create Account</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    
                    <div id="forgotPane" class="d-none">
                        <h4 class="fw-bold mb-3 text-center">Reset Password</h4>
                        <p class="text-muted small text-center mb-4">Enter email and new password to reset.</p>
                        <form id="resetForm">
                            <div class="mb-3">
                                <label for="resetEmail" class="form-label fw-bold small">REGISTERED EMAIL</label>
                                <input type="email" id="resetEmail" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label for="resetNewPass" class="form-label fw-bold small">NEW PASSWORD</label>
                                <input type="password" id="resetNewPass" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 btn-lg shadow fw-bold mb-3">Update Password</button>
                            <button type="button" id="backToLoginBtn" class="btn btn-link w-100 text-decoration-none text-muted small">Back to Login</button>
                        </form>
                        <div id="resetStatus" class="small mt-2 text-center" aria-live="polite"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function syncUsers() {
            const rawData = localStorage.getItem('ar_users') || localStorage.getItem('ar_portal_users');
            if (rawData) return JSON.parse(rawData);
            return [
                { email: 'tenant@test.com', password: '123', role: 'tenant', name: 'John Tenant' },
                { email: 'staff@test.com', password: '123', role: 'worker', name: 'Mike Worker' },
                { email: 'admin@test.com', password: '123', role: 'admin', name: 'Project Admin' }
            ];
        }
        let users = JSON.parse(localStorage.getItem('ar_users')) || [
            { email: 'tenant@test.com', password: '123', role: 'tenant', name: 'John Tenant' },
            { email: 'staff@test.com', password: '123', role: 'worker', name: 'Mike Worker' },
            { email: 'admin@test.com', password: '123', role: 'admin', name: 'Project Admin' }
        ];

        window.onload = () => { document.getElementById("lEmail").focus(); };

        const authTabs = document.getElementById('authTabs');
        const forgotPane = document.getElementById('forgotPane');

        
        document.getElementById('toForgotBtn').onclick = (e) => {
            e.preventDefault();
            authTabs.classList.add('d-none');
            forgotPane.classList.remove('d-none');
            document.getElementById('resetEmail').focus();
        };

        document.getElementById('backToLoginBtn').onclick = () => {
            forgotPane.classList.add('d-none');
            authTabs.classList.remove('d-none');
            document.getElementById('resetStatus').innerText = "";
        };

        
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const users = syncUsers();
            const email = document.getElementById('lEmail').value;
            const pass = document.getElementById('lPass').value;
            const user = users.find(u => u.email === email && u.password === pass);
            
            if (user) {
                user.role = String(user.role).toLowerCase().trim();
                sessionStorage.setItem('ar_user', JSON.stringify(user));
                if (user.role === 'admin') window.location.href = 'admin.html';
                else if (user.role === 'tenant') window.location.href = 'tenant.html';
                else if (user.role === 'worker') window.location.href = 'staff.html';
            } else {
                
                const errBox = document.getElementById("loginError");
                errBox.className = "text-danger small mt-2"; 
                errBox.innerText = "Login failed: Incorrect email or password.";
            }
        };

        
        document.getElementById('regForm').onsubmit = (e) => {
            e.preventDefault();
            let users = syncUsers();
            const email = document.getElementById('rEmail').value;
            if (users.find(u => u.email === email)) return alert("Email already registered.");
            const newUser = { name: document.getElementById('rName').value, email, password: document.getElementById('rPass').value, role: document.getElementById('rRole').value };
            users.push(newUser);
            localStorage.setItem('ar_users', JSON.stringify(users));
            alert("Registration successful! Please login.");
            location.reload();
        };

        
        document.getElementById('resetForm').onsubmit = (e) => {
            e.preventDefault();
            let users = syncUsers();
            const email = document.getElementById('resetEmail').value;
            const newPass = document.getElementById('resetNewPass').value;
            const statusBox = document.getElementById('resetStatus');
            const userIndex = users.findIndex(u => u.email === email);

            if (userIndex !== -1) {
                if (users[userIndex].password === newPass) {
                    statusBox.className = "small mt-2 text-center text-danger";
                    statusBox.innerText = "Error: New password cannot be the same as the old one.";
                    return; 
                }
                users[userIndex].password = newPass;
                localStorage.setItem('ar_users', JSON.stringify(users));
                
                statusBox.className = "small mt-2 text-center text-success";
                statusBox.innerText = "Success! Password updated. Redirecting...";
                
                setTimeout(() => {
                    document.getElementById('backToLoginBtn').click();
                    document.getElementById('lPass').value = "";
                    
                    document.getElementById('loginError').className = "text-primary small mt-2";
                    document.getElementById('loginError').innerText = "Password reset successfully. Please sign in.";
                }, 1500);
            } else {
                statusBox.className = "small mt-2 text-center text-danger";
                statusBox.innerText = "Error: User email not found.";
            }
        };
    </script>
</body>
</html>
